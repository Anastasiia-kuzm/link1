<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    
    <meta http-equiv="refresh" content="4;url=https://donux.com/case-studies#:~:text=Legal%20Tech-,Networklex,-Building%20Networklex%20SRL%E2%80%99s">
    
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #ffffff; 
            color: #1d1d1f; 
        }
        .loader { text-align: center; }
        .spinner { 
            border: 2px solid #f3f3f3; 
            border-top: 2px solid #007AFF; 
            border-radius: 50%; 
            width: 24px; 
            height: 24px; 
            animation: spin 0.8s linear infinite; 
            margin: 0 auto 16px; 
        }
        p { font-size: 15px; opacity: 0.7; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Loading Networklex case study...</p>
    </div>

    <script>
        window.onload = function() {
            // Збільшено затримку до 3 секунд (3000 мс)
            setTimeout(function() {
                const targetUrl = "https://donux.com/case-studies#:~:text=Legal%20Tech-,Networklex,-Building%20Networklex%20SRL%E2%80%99s";
                window.location.replace(targetUrl);
            }, 3000); 
        };
    </script>
</body>
</html>
