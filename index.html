<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перехід до проекту Networklex...</title>
    
    <meta http-equiv="refresh" content="2;url=https://donux.com/case-studies#:~:text=Legal%20Tech-,Networklex,-Building%20Networklex%20SRL%E2%80%99s">
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
            color: #333;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #007AFF;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        p {
            font-size: 16px;
            margin: 0;
            opacity: 0.8;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Завантаження кейсу Networklex...</p>
    </div>

    <script>
        window.onload = function() {
            setTimeout(function() {
                // Головне перенаправлення з оновленим текстом (включно з SRL’s)
                window.location.replace("https://donux.com/case-studies#:~:text=Legal%20Tech-,Networklex,-Building%20Networklex%20SRL%E2%80%99s");
            }, 1000); // 1 секунда затримки для надійності в Safari
        };
    </script>
</body>
</html>
